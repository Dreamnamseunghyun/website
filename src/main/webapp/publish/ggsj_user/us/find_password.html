<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>건강살자(사용자) 비밀번호 찾기</title>
    <link href="https://cdn.jsdelivr.net/npm/xeicon@2.3.3/xeicon.min.css" rel="stylesheet"  type="text/css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.8.2/css/all.min.css">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/Swiper/5.4.5/css/swiper.min.css" rel="stylesheet" type="text/css">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/slick-carousel/1.8.1/slick.css" rel="stylesheet" type="text/css">
    <link href="../css/us/bootstrap.css" rel="stylesheet"  type="text/css">
    <link href="../css/us/common.css" rel="stylesheet" type="text/css">
    <link href="../css/us/header.css" rel="stylesheet" type="text/css">
    <link href="../css/us/footer.css" rel="stylesheet" type="text/css">
    <link href="../css/us/login.css" rel="stylesheet" type="text/css">
    <link href="../css/us/find_password.css" rel="stylesheet" type="text/css">
</head>
<body>
    <header></header>
    <div class="header_blank"></div>
    <!--header-->
    <main>
        <section class="main_section">
           <div class="main_cont">
            <div class="container">
                    <div class="row">
                        <div class="cont_area">
                          <div class="step_area step01 active">

                               <div class="title_area">
                                    <div class="title">
                                        <h2>비밀번호 찾기</h2>

                                    </div>
                                    <p class="sub_title">비밀번호를 찾고자 하는<br><br class="mo">
                                    아이디를 입력해 주세요.
                                    </p>
                                </div>

                                <div class="input_area">
                                    <div class="write row">
                                          <div class="input_type1 col-md-12">
                                             <label for="s_f1">
                                               <input type="text" name="s_f1" id="s_f1" class="id_input" placeholder="&nbsp;" required="" autocomplete="off" maxlength="20">
                                               <span class="label">아이디를 입력 해주세요</span>
                                             </label>
                                          </div>
                                </div><!--이름-->
                                </div><!--input_area-->


                                <div class="btn step01_btn">
                                        <span class="button_on_circle"></span>
                                        <a class="btn_inner">
                                          <span class="btn_txt_area">
                                            다음
                                          </span>
                                        </a>
                                </div>
                            </div><!--step01-->

                            <div class="step_area step02 chk_type2_2">
                                <div class="title_area">
                                    <div class="title">
                                        <h2><span class="back"><a><i class="xi-angle-left"></i></a> 뒤로</span>
                                        비밀번호 찾기 방법 선택
                                        </h2>
                                    </div>
                                    <p class="sub_title">비밀번호를 찾을 방법을 선택해 주세요.
                                    </p>
                                </div>


                               <div class="write active">

                                        <div class="chk_area">
                                            <div class="chk_boxArea">
                                                <label class="item" for="s_f2">
                                                    <input type="checkbox" name="s_f2" id="s_f2" class="hidden" value="본인 명의 휴대전화 인증">
                                                        <label class="cbx" for="s_f2">
                                                            <svg height="20px" viewBox="0 -8 16 30" width="20px">
                                                             <polyline points="1 7.6 5 11 13 1"></polyline>
                                                         </svg>
                                                        </label>
                                                        <label class="cbx-lbl" for="s_f2">본인 명의 휴대전화 인증</label>
                                                </label>
                                             </div>
                                         </div>


                                    <div class="select_list">
                                            <div class="write row">
                                                      <div class="input_type1 col-md-12">
                                                         <label for="s_f2_1">
                                                           <input type="text" name="s_f2_1" id="s_f2_1" class="ko" placeholder="&nbsp;" required="" autocomplete="off">
                                                           <span class="label">이름을 입력하세요</span>
                                                         </label>
                                                      </div>
                                            </div><!--이름-->
                                            <div class="write row">
                                                      <div class="input_type1 col-md-9 certifi_box">
                                                         <label for="s_f2_2">
                                                           <input type="text" name="s_f2_2" id="s_f2_2" class="phone_num" maxlength="13" class="only_num" placeholder="&nbsp;" required="" autocomplete="off">
                                                           <span class="label">휴대폰 번호 (숫자만 입력)</span>
                                                         </label>
                                                      </div>
                                                      <div class="certi_btn col-md-3">
                                                          <a>인증</a>
                                                      </div>
                                            </div><!--휴대폰번호-->

                                            <div class="write row">
                                                      <div class="input_type1 col-md-12">
                                                         <label for="s_f2_3">
                                                           <input type="text" name="s_f2_3" id="s_f2_3" class="only_num" placeholder="&nbsp;" required="" autocomplete="off">
                                                           <span class="label">인증번호를 입력 하세요</span>
                                                         </label>
                                                      </div>
                                            </div><!--인증번호-->
                                        </div>
                                </div><!--휴대전화 인증-->



                                <div class="write">
                                   <div class="chk_area">
                                            <div class="chk_boxArea">
                                                <label class="item" for="s_f3">
                                                    <input type="checkbox" name="s_f3" id="s_f3" class="hidden" value="본인 확인 이메일 인증">
                                                        <label class="cbx" for="s_f3">
                                                            <svg height="20px" viewBox="0 -8 16 30" width="20px">
                                                             <polyline points="1 7.6 5 11 13 1"></polyline>
                                                         </svg>
                                                        </label>
                                                        <label class="cbx-lbl" for="s_f3">본인 확인 이메일로 인증</label>
                                                </label>
                                             </div>
                                         </div>

                                    <div class="select_list">
                                            <div class="write row">
                                                      <div class="input_type1 col-md-12">
                                                         <label for="s_f3_1">
                                                           <input type="text" name="s_f3_1" id="s_f3_1" class="ko" placeholder="&nbsp;" required="" autocomplete="off">
                                                           <span class="label">이름을 입력 해주세요</span>
                                                         </label>
                                                      </div>
                                            </div><!--이름-->
                                            <div class="write row">
                                                      <div class="input_type1 col-md-9 certifi_box">
                                                         <label for="s_f3_2">
                                                           <input type="text" name="s_f3_2" id="s_f3_2" class="email_input" placeholder="&nbsp;" required="" autocomplete="off">
                                                           <span class="label">이메일 주소</span>
                                                         </label>
                                                      </div>
                                                      <div class="certi_btn col-md-3">
                                                          <a>인증</a>
                                                      </div>
                                            </div><!--이메일주소-->

                                            <div class="write row">
                                                      <div class="input_type1 col-md-12">
                                                         <label for="s_f3_3">
                                                           <input type="text" name="s_f3_3" id="s_f3_3" class="only_num" placeholder="&nbsp;" required="" autocomplete="off">
                                                           <span class="label">인증번호를 입력 하세요</span>
                                                         </label>
                                                      </div>
                                            </div><!--인증번호-->
                                        </div>
                                </div><!--이메일인증-->

                                 <div class="btn step02_btn">
                                    <span class="button_on_circle"></span>
                                    <a href="#" class="btn_inner">
                                      <span class="btn_txt_area">
                                        다음
                                      </span>
                                    </a>
                                </div>

                            </div><!--step02-->



                            <div class="step_area step03">
                               <div class="step03_area">
                                <div class="title_area">
                                    <div class="title">
                                        <h2>
                                        <span class="back"><a><i class="xi-angle-left"></i></a> 뒤로</span>
                                        비밀번호 재설정</h2>
                                    </div>
                                    <p class="sub_title">비밀번호를 변경해 주세요.
                                    </p>
                                </div>
                                <div class="input_area">
                                    <div class="write row">
                                          <div class="input_type1 col-md-12 password_area">
                                             <label for="s_f4" class="password_box">
                                               <input type='password' name="s_f4" id="s_f4" class="password_input" placeholder="&nbsp;" required="" autocomplete="off" maxlength="16">
                                               <span class="label">새 비밀번호를 입력해주세요.</span>
                                             </label>
                                             <span class="password_icon"><i class="fa fa-eye-slash"></i></span>
                                          </div>
                                    </div><!--새 비밀번호-->

                                    <div class="write row">
                                          <div class="input_type1 col-md-12 password_area">
                                             <label for="s_f5" class="password_box">
                                               <input type='password' name="s_f5" id="s_f5" class="password_input" placeholder="&nbsp;" required="" autocomplete="off" maxlength="16">
                                               <span class="label">새 비밀번호 확인</span>
                                             </label>
                                             <span class="password_icon"><i class="fa fa-eye-slash"></i></span>
                                          </div>
                                    </div><!--새 비밀번호-->


                                </div><!--input_area-->

                                <div class="btn step03_btn">
                                    <span class="button_on_circle"></span>
                                    <a href="#" class="btn_inner">
                                      <span class="btn_txt_area">
                                        확인
                                      </span>
                                    </a>
                                </div>

                            </div><!--step03_area-->

                            <div class="noti_area">
                                <div class="title"><p><i class="xi-info-o"></i> <span>알림</span></p></div>
                                <div class="info">
                                    <p>비밀번호는 최소 1개의 숫자 혹은 특수문자를 포함하여<br class="mo">(8자 이상 16자 이하) 사용해 주세요</p>
                                    <p>다른 사이트와 다른 건강살자만의 비밀번호를 만들어 주세요.</p>

                                    </div>
                             </div><!--noti_area-->

                            </div><!--step03-->
                        </div><!--cont_area-->


                    </div><!--row-->

            </div><!--container-->


            </div><!--main_cont-->
        </section><!--main_section-->



    </main>


    <footer>

    </footer>

<script src="https://code.jquery.com/jquery-latest.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@9"></script>
<script src="../js/us/sub_common.js"></script>
<script>


$("header").load("header.html");
$("footer").load("footer.html");






$(".main_section .cont_area .title_area .back").click(function(){
    $(this).parents(".step_area").removeClass("active").prev().addClass("active");
})


/****
step02
****/






  

//step01
$(".step01_btn").click(function(){
    if(!s_f1.value){ //아이디

    $("#s_f1").parents("label").addClass("input_focus").find("input").focus();

    setTimeout(() => {
        $("#s_f1").parents("label").removeClass("input_focus")
    },  1000);

    Swal.fire('아이디를 입력해 주세요.', '', 'warning' );
	return;
    }


  $(this).parents(".step_area").removeClass("active").next().addClass("active");

})



//step02
$("document").ready(function(){
    $(".step02.chk_type2_2 .write.active").find(".item input").prop("checked",true)
})

//chk_type2_2 (눌렀을때 정보창이 뜨게)
$(".chk_type2_2 .chk_area .item").click(function(){
     $(this).find("input").prop("checked",true).parents(".write").addClass("active")

var chk = $(this).find("input").is(":checked");

    if (chk){ //체크가 되었을시
      $(this).find("input").prop("checked",true).parents(".write").addClass("active").siblings("div").removeClass("active").find(".item input").prop("checked",false)
    }
});


$(".step02_btn").click(function(){
    var select01_active = $(".step02 > .write:nth-of-type(2) .chk_area .item input").is(":checked");
    var select02_active = $(".step02 > .write:nth-of-type(3) .chk_area .item input").is(":checked")

    if(select01_active){
           if(!s_f2_1.value){ //이름

            $("#s_f2_1").parents("label").addClass("input_focus").find("input").focus();
            setTimeout(() => {
            $("#s_f2_1").parents("label").removeClass("input_focus")
              },  1000);
            Swal.fire('이름을 입력해주세요.', '', 'warning' );
            return;
            }

            if(!s_f2_2.value){ //휴대폰 번호

            $("#s_f2_2").parents("label").addClass("input_focus").find("input").focus();
            setTimeout(() => {
            $("#s_f2_2").parents("label").removeClass("input_focus")
              },  1000);
            Swal.fire('휴대폰번호를 입력해주세요.', '', 'warning' );
            return;
            }

            if(!s_f2_3.value){ //휴대폰 번호 (인증)

            $("#s_f2_3").parents("label").addClass("input_focus").find("input").focus();
            setTimeout(() => {
            $("#s_f2_3").parents("label").removeClass("input_focus")
              },  1000);
            Swal.fire('인증번호를 입력해주세요.', '', 'warning' );
            return;
            }


       }//휴대전화 인증 선택시


    if(select02_active){

           if(!s_f3_1.value){ //이름

            $("#s_f3_1").parents("label").addClass("input_focus").find("input").focus();
            setTimeout(() => {
                $("#s_f3_1").parents("label").removeClass("input_focus")
            },  1000);
            Swal.fire('이름을 입력해주세요.', '', 'warning' );
            return;
            }


            if(!s_f3_2.value){ //이메일 주소

            $("#s_f3_2").parents("label").addClass("input_focus").find("input").focus();
            setTimeout(() => {
                $("#s_f3_2").parents("label").removeClass("input_focus")
            },  1000);
            Swal.fire('이메일 주소를 입력해주세요.', '', 'warning' );
            return;
            }

            if(!email_check(s_f3_2.value)){ //이메일 주소 유효성체크

            $("#s_f3_2").parents("label").addClass("input_focus").find("input").focus();
            setTimeout(() => {
                $("#s_f3_2").parents("label").removeClass("input_focus")
            },  1000);
            Swal.fire('올바른 이메일 주소를 입력해주세요.', '', 'warning' );
            return;
            }

            if(!s_f3_3.value){ //휴대폰 번호 (인증)

            $("#s_f3_3").parents("label").addClass("input_focus").find("input").focus();
            setTimeout(() => {
                $("#s_f3_3").parents("label").removeClass("input_focus")
            },  1000);
            Swal.fire('인증번호를 입력해주세요.', '', 'warning' );
            return;
            }

       }//이메일 인증시
       $(this).parents(".step_area").removeClass("active").next().addClass("active");

})


//step03
$(".step03_btn").click(function(){

    //새 비밀번호
    if(!s_f4.value){

        $("#s_f4").parents("label").addClass("input_focus").find("input").focus();
        setTimeout(() => {
            $("#s_f4").parents("label").removeClass("input_focus")
        },  1000);
        Swal.fire('새 비밀번호를 입력해 주세요.', '', 'warning' );
        return;
    }


    if(!password_check(s_f4.value)){ //비밀번호 유효성 체크

            $("#s_f4").parents("label").addClass("input_focus").find("input").focus();
             setTimeout(() => {
                $("#s_f4").parents("label").removeClass("input_focus")
            },  1000);
            Swal.fire('8~16자 이내, 최소 1개의 숫자 혹은\n 특수문자를 사용하여 입력해주세요.', '', 'warning' );
            return;
    }


    //새 비밀번호 확인
    if(!s_f5.value){

    $("#s_f5").parents("label").addClass("input_focus").find("input").focus();
    setTimeout(() => {
        $("#s_f5").parents("label").removeClass("input_focus")
    },  1000);
    Swal.fire('새 비밀번호 확인을 입력해 주세요.', '', 'warning' );
	return;
    }

    if(s_f5.value != s_f4.value){

    $("#s_f5").parents("label").addClass("input_focus").find("input").focus();
    setTimeout(() => {
        $("#s_f5").parents("label").removeClass("input_focus")
    },  1000);
    Swal.fire('비밀번호가 일치하지 않습니다.', '', 'warning' );
	return;
    }

    //통과
    location.href="index.html"

})


</script>
</body>
</html>
