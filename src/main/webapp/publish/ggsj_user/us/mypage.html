<script>



$("header").load("header_login.html");
$("footer").load("footer.html");


$(".check_btn").click(function(){

    if($('#s_v1_1:checked').length <= "0" && $('#s_v1_2:checked').length <= "0"){ //유저

        $("#s_v1_1").parents("label").find(".cbx").addClass("chk_focus").focus();
        $("#s_v1_2").parents("label").find(".cbx").addClass("chk_focus").focus();

        setTimeout(() => {
        $("#s_v1_1").parents("label").find(".cbx").removeClass('chk_focus');
        $("#s_v1_2").parents("label").find(".cbx").removeClass('chk_focus');
        },  1000);

         Swal.fire('본인 또는 가족을 선택해 주세요', '', 'warning' );
		return;
        }


    if(!s_v2.value){ //이름

    $("#s_v2").parents("label").addClass("input_focus").find("input").focus();
        setTimeout(() => {
                $("#s_v2").parents("label").removeClass("input_focus")
        },  1000);
    Swal.fire('이름을 입력해 주세요.', '', 'warning' );
	return;
    }

    if(!s_v3.value){ //생년월일

    $("#s_v3").parents("label").addClass("input_focus").find("input").focus();
        setTimeout(() => {
                    $("#s_v3").parents("label").removeClass("input_focus")
            },  1000);
    Swal.fire('생년월일을 입력해 주세요.', '', 'warning' );
	return;
    }

    if(s_v3.value.length < "8"){ //생년월일 8자리

    $("#s_v3").parents("label").addClass("input_focus").find("input").focus();
        setTimeout(() => {
                $("#s_v3").parents("label").removeClass("input_focus")
        },  1000);

    Swal.fire('생년월일 8자리를 입력해 주세요.', '', 'warning' );
	return;
    }

    if($('#s_v4_1:checked').length <= "0" && $('#s_v4_2:checked').length <= "0"){//성별

        $("#s_v4_1").parents("label").find(".cbx").addClass("chk_focus").focus();
        $("#s_v4_2").parents("label").find(".cbx").addClass("chk_focus").focus();

        setTimeout(() => {
        $("#s_v4_1").parents("label").find(".cbx").removeClass('chk_focus');
        $("#s_v4_2").parents("label").find(".cbx").removeClass('chk_focus');
        },  1000);

         Swal.fire('성별을 선택해 주세요', '', 'warning' );
		return;
        }


    //변결될 비밀번호
    if(!s_v5_1.value){

        $("#s_v5_1").parents("label").addClass("input_focus").find("input").focus();
        setTimeout(() => {
            $("#s_v5_1").parents("label").removeClass("input_focus")
        },  1000);
        Swal.fire('변경할 비밀번호를 입력해 주세요.', '', 'warning' );
        return;
    }


    if(!password_check(s_v5_1.value)){ //비밀번호 유효성체크

            $("#s_v5_1").parents("label").addClass("input_focus").find("input").focus();
             setTimeout(() => {
                $("#s_v5_1").parents("label").removeClass("input_focus")
            },  1000);
            Swal.fire('8~16자 이내, 최소 1개의 숫자 혹은\n 특수문자를 사용하여 입력해주세요.', '', 'warning' );
            return;
    }


    //새 비밀번호 확인
    if(!s_v5_2.value){

    $("#s_v5_2").parents("label").addClass("input_focus").find("input").focus();
    setTimeout(() => {
        $("#s_v5_2").parents("label").removeClass("input_focus")
    },  1000);
    Swal.fire('비밀번호 확인을 입력해 주세요.', '', 'warning' );
	return;
    }

    if(s_v5_1.value != s_v5_2.value){

    $("#s_v5_2").parents("label").addClass("input_focus").find("input").focus();
    setTimeout(() => {
        $("#s_v5_2").parents("label").removeClass("input_focus")
    },  1000);
    Swal.fire('비밀번호가 일치하지 않습니다.', '', 'warning' );
	return;
    }



    if(!s_v6.value){ //휴대폰번호

    $("#s_v6").parents("label").addClass("input_focus").find("input").focus();
        setTimeout(() => {
                    $("#s_v6").parents("label").removeClass("input_focus")
            },  1000);
    Swal.fire('휴대폰번호를 입력해 주세요.', '', 'warning' );
	return;
    }

    if(!s_v7_1.value){ //이메일 아이디
    $("#s_v7_1").parents("label").addClass("input_focus").find("input").focus();
        setTimeout(() => {
                    $("#s_v7_1").parents("label").removeClass("input_focus")
            },  1000);
       Swal.fire('이메일 아이디를 입력해 주세요.', '', 'warning' );
        	return;
    }

    if(!s_v7_2.value){ //이메일 주소

        $("#s_v7_2").parents(".select_box").find(".custom-select-trigger").addClass("select_focus").parents(".custom-select-wrapper").find("select.custom-select").focus();
            setTimeout(() => {
                        $("#s_v7_2").parents(".select_box").find(".custom-select-trigger").removeClass("select_focus")
                },  1000);
        Swal.fire('이메일 주소를 입력해 주세요.', '', 'warning' );
        return;
    }

     Swal.fire('예약 완료하기\n버튼을 눌러주세요.', '', 'success');


    if(!s_v8.value){ //기업명

    $("#s_v8").parents("label").addClass("input_focus").find("input").focus();
        setTimeout(() => {
                $("#s_v8").parents("label").removeClass("input_focus")
        },  1000);
    Swal.fire('기업명을 입력해 주세요.', '', 'warning' );
	return;
    }

 

    if(!s_v9_1.value){ //우편번호
    $("#s_v9_1").parents("label").addClass("input_focus").find("input").focus();
        setTimeout(() => {
                    $("#s_v9_1").parents("label").removeClass("input_focus")
            },  1000);
       Swal.fire('우편번호를 입력해 주세요.', '', 'warning' );
        	return;
    }

     if(!s_v9_2.value){ //주소
    $("#s_v9_2").parents("label").addClass("input_focus").find("input").focus();
        setTimeout(() => {
                    $("#s_v9_2").parents("label").removeClass("input_focus")
            },  1000);
       Swal.fire('주소를 입력해 주세요.', '', 'warning' );
         	return;
    }


})

$(".check_edit_btn").click(function(){  //수정 버튼
    if($('#s_v1_1:checked').length <= "0" && $('#s_v1_2:checked').length <= "0" || !s_v2.value || !s_v3.value || !s_v5.value || !s_v6_1.value || !s_v6_2.value || !s_v7_1.value || !s_v7_2.value || $('#s_v5_1:checked').length <= "0" && $('#s_v5_2:checked').length <= "0"){

         Swal.fire('정보 확인을\n완료하신 후 시도해 주세요.', '', 'warning');
         return;
    }

    Swal.fire('작성하신 정보로\n수정이 완료되었습니다.', '', 'success');


    location.href="index.html"
})




</script>
