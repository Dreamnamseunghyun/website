<script src="https://code.jquery.com/jquery-latest.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@9"></script>

<script src="../js/us/sub_common.js"></script>
<script>
/****
추가해야할 팝업 입니다
****/

//병원검색시 맞는 조건이 없을시 팝업이 뜨는 조건입니다.

/*
Swal.fire('선택하신 지역에는 원하시는 검진항목을\n검사 가능한 병원이 없습니다.\n\n검진항목/예약일정/병원우선\n선택 가능한 화면에서 다시 한번 선택\n부탁드립니다.', '', 'warning' );
*/

 
$("header").load("header.html");
$("footer").load("footer.html");
$(".user_info_area").load("user_info_area.html");

 

$(".search_btn").click(function(){
    var special_checkup = $(".user_special_checkup").hasClass("active")



    if(special_checkup = "true"){

        if($('#s_v1:checked').length <= "0"){//특수검진기관

        $("#s_v1").parents("label").find(".cbx").addClass("chk_focus").focus();


        setTimeout(() => {
        $("#s_v1").parents("label").find(".cbx").removeClass('chk_focus');

        },  1000);

        Swal.fire('귀하는 특수검진 대상자입니다.\n특수검진기관에 체크 해주세요.', '', 'warning' );

    return;

		return;
        }


    }


    if(!s_v2.value){ //지역

        $("#s_v2").parents(".select_box").find(".custom-select-trigger").addClass("select_focus").parents(".custom-select-wrapper").find("select.custom-select").focus();
            setTimeout(() => {
                        $("#s_v2").parents(".select_box").find(".custom-select-trigger").removeClass("select_focus")
                },  1000);
        Swal.fire('지역을 선택해 주세요.', '', 'warning' );
        return;
    }

    if(!s_v3.value){ //세부지역

        $("#s_v3").parents(".select_box").find(".custom-select-trigger").addClass("select_focus").parents(".custom-select-wrapper").find("select.custom-select").focus();
            setTimeout(() => {
                        $("#s_v3").parents(".select_box").find(".custom-select-trigger").removeClass("select_focus")
                },  1000);
        Swal.fire('세부지역을 선택해 주세요.', '', 'warning' );
        return;
    }


 $(".hospital_select_area").slideDown(400)

}) 

$(".reserve_btn").click(function(){
    var reserve_check = $(this).parents(".list").find(".select_box input[type='hidden']").val();

    if(!reserve_check){ //

    $(this).parents(".list").find(".select_box .custom-select-trigger").addClass("select_focus").focus();
            setTimeout(() => {
                         $(this).parents(".list").find(".select_box .custom-select-trigger").removeClass("select_focus")
                },  1000);
        Swal.fire('검진 유형을 선택해 주세요.', '', 'warning' );
        return;
    }

    //통과
    location.href="ex_item_selection_package_option.html"


})//click 
  
 

</script>
