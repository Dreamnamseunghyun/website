<!DOCTYPE html> 
<html lang="ko"> 
<head>   
<meta charset="UTF-8">    
<title>건강살자(사용자) 성별 선택</title>
<link href="https://cdn.jsdelivr.net/npm/xeicon@2.3.3/xeicon.min.css" rel="stylesheet"  type="text/css">    
<link href="https://cdnjs.cloudflare.com/ajax/libs/Swiper/5.4.5/css/swiper.min.css" rel="stylesheet" type="text/css">
<link href="https://cdnjs.cloudflare.com/ajax/libs/slick-carousel/1.8.1/slick.css" rel="stylesheet" type="text/css">  
<link href="../css/us/bootstrap.css" rel="stylesheet"  type="text/css">  
<link href="../css/us/common.css" rel="stylesheet" type="text/css"> 
<link href="../css/us/header.css" rel="stylesheet" type="text/css"> 
<link href="../css/us/footer.css" rel="stylesheet" type="text/css"> 
<link href="../css/us/reserve_step_line.css" rel="stylesheet" type="text/css">
<link href="../css/us/sub_common.css" rel="stylesheet" type="text/css">  
<link href="../css/us/sexual_selection.css" rel="stylesheet" type="text/css"> 
</head>                  
<body>         
<header></header>      
<div class="header_blank"></div> 
<!--header-->       
<main> 
    <section class="main_section">  
        <div class="main_cont">  
            <div class="step_line"> <!--step_line--> 
                <div class="step_line_color"> 
                    <div class="step_color step_color_first active">
                    </div> 
                    <div class="container">
                    </div>
                    <div class="step_color step_color_last">
                    </div>
                </div> 
                <div class="container">
                    <div class="row"> 
                        <div class="step_area"> 
                            <div class="step step01 active">
                                <div class="step_inner">
                                    <div class="left_area">
                                        <div class="title">
                                            <h3>STEP 1</h3>
                                        </div>
                                        <div class="info">
                                            검진 예약
                                        </div>
                                    </div>
                                    <div class="right_area">
                                        <img src="../img/us/reserve/step_line/step_line_img01_active.png">  
                                    </div>
                                </div>
                                <div class="step_border">
                                </div> 
                            </div><!--step01-->
                            <div class="step step02">
                                <div class="step_inner">
                                    <div class="left_area">
                                        <div class="title">
                                            <h3>STEP 2</h3>
                                        </div>
                                        <div class="info">
                                            검진 항목 선택
                                        </div> 
                                    </div>
                                    <div class="right_area">
                                        <img src="../img/us/reserve/step_line/step_line_img02.png">
                                    </div>
                                </div>
                                <div class="step_border">
                                </div>
                            </div><!--step02-->
                            <div class="step step03">
                                <div class="step_inner">
                                    <div class="left_area">
                                        <div class="title">
                                            <h3>STEP 3</h3>
                                        </div>
                                        <div class="info">
                                            병원 및 항목 선택
                                        </div>
                                    </div>
                                    <div class="right_area"> 
                                        <img src="../img/us/reserve/step_line/step_line_img03.png">
                                    </div> 
                                </div>
                                <div class="step_border">
                                </div>
                            </div><!--step03-->
                            <div class="step step04">
                                <div class="step_inner">
                                    <div class="left_area">
                                        <div class="title">
                                            <h3>STEP 4</h3>
                                        </div>
                                        <div class="info">
                                            검진 희망일 선택
                                        </div>
                                    </div>
                                    <div class="right_area">
                                        <img src="../img/us/reserve/step_line/step_line_img04.png">
                                    </div>
                                </div>
                                <div class="step_border">
                                </div> 
                            </div><!--step04--> 
                            <div class="step step05">
                                <div class="step_inner">
                                    <div class="left_area">
                                        <div class="title">
                                            <h3>STEP 5</h3>
                                        </div>
                                        <div class="info">
                                            최종 예약 정보
                                        </div>
                                    </div>
                                    <div class="right_area">
                                        <img src="../img/us/reserve/step_line/step_line_img05.png">
                                    </div>
                                </div> 
                            </div><!--step05-->

                        </div><!--step_area-->
                    </div><!--row--> 
                </div><!--container-->  
            </div><!--step_line-->   
                    
            <div class="container">    
                               <div class="title_area">      
                                     <div class="title"> 
                                        <span class="point_line point_color"></span>  
                                        <h2>성별 선택</h2> 
                                     </div>        
                                     <div class="title_add_txt">정확한 검진 항목 선택을 위해 고객님의 성별을 선택해주세요</div>
                             </div>
   
                                <div class="userSelection">   
                                    <div class="selectionBox male" data-sexual="male"> 
                                        <div class="inner_wrap"> 
                                            <div class="circle"></div>
                                            <p>남성</p>
                                        </div><!--innner_wrap-->  
                                    </div><!--selectionBox--> 
                                    <div class="selectionBox female" data-sexual="female">  
                                        <div class="inner_wrap"> 
                                            <div class="circle"></div>
                                            <p>여성</p>
                                        </div><!--innner_wrap-->  
                                    </div><!--selectionBox-->  
                                        
                                </div><!--userSelection-->  


            </div><!--container-->  

                            
        </div><!--main_cont-->  
    </section><!--main_section-->    
<div class="btn_area">   
                                    <div class="btn sexual_btn">    
                                            <span class="button_on_circle"></span>
                                            <a href="#none" class="btn_inner blue_gradient">
                                              <span class="btn_txt_area">
                                                예약 시작하기
                                              </span>       
                                            </a>     
                                    </div>   
                                </div><!--btn_area--> 
    
</main> 
    
     
                                
<footer>     
         
</footer>    
    
<script src="https://code.jquery.com/jquery-latest.min.js"></script>     
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@9"></script>    
<script>   

 

$("header").load("header.html");            
$("footer").load("footer.html");    
    
 
     
      
     
$(".userSelection .selectionBox").click(function(){
    var selection_box_check = $(this).hasClass("select");   
      
    if(selection_box_check){//선택이 되있으면
         $(this).removeClass("select").siblings("div").removeClass("select");
    }
    else{
        $(this).addClass("select").siblings("div").removeClass("select"); 
    }
})   
    
    
$(".sexual_btn").click(function(){  
    var select_sexual = $(".userSelection .selectionBox.select").attr("data-sexual");
    
    if($(".userSelection .selectionBox.select").length <= "0"){//성별     
         Swal.fire('성별을 선택해 주세요', '', 'warning' );  
		return;      
    }
    
    if(select_sexual == "male"){
      location.href="checkup_selection_male.html"    
    }//남성 
    
    if(select_sexual == "female"){
      location.href="checkup_selection_female.html"    
    }     
 
 
     }) 
</script>  
</body>
</html>
