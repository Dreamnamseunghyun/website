        "                                        1. “회사”는 “전자상거래 등에서의 소비자보호에 관한 법률”, “약관의 규제에 관한 법률“, ”전자문서 및 전자거래기본법“, ”전자금융거래법“, ”전자서명법“, ”정보통신망 이용촉진 및 정보 보호 등에 관한 법률“, ”소비자 기본법“ 등 관련 법을 위해하지 않는 범위에서 이 약관을 개정할 수 있습니다.<br>" +
        "                                        2. 이 약관에서 정하지 아니한 사항과 이 약관의 해석에 관하여는 전자상거래 등에서의 소비자보호에 관한 법률, 약관의 규제 등에 관한 법률, 공정거래위원회가 정하는 전자상거래 등에서의 소비자 보호지침 및 관계법령 또는 상관례에 따릅니다." +
        "                                        <br><br>" +
        "                                        제3조 (용어의 정의)<br>" +

        "                                        1. 회사 : “플랫폼” 사업과 관련된 경제활동을 영위하는 자로서 “플랫폼” 및 제반서비스를 제공하는 자를 말합니다.<br>" +
        "                                        2. 플랫폼 : “플랫폼”이란 회사가 운영하는 웹 기반의 서비스<a href=\"https://www.ggsj.co.kr\" target='_blank'>(http://www.ggsj.co.kr)</a> 및 “회원”에게 제공되는 라이프케어 서비스를 말합니다.<br><br>" +
        "                                        2. 회원 : “회사”가 제공하는 “플랫폼”을 이용할 권리를 보유하는 대신 “회사”에 대하여 이 약관에 따른 일정한 의무를 부담하는 자로 “회원”이 되는 방법에 따라 개인회원과 기업(단체)회원으로 구분됩니다.<br>" +
        "                                        3. 개인회원 : “플랫폼”(사이트)에 로그인하여 본 약관에 따라 회사가 제공하는 서비스를 이용하는 이용자를 말합니다.<br>" +
        "                                        4. 기업(단체)회원 : “회사”의 기업단위 서비스계약을 통하여 회원가입을 한 자로서 기업이 “회사”에서 실시하는 협약(구두, 문서 등)을 통한 “회원”으로 계약한 자를 기업(단체)회원이라고 합니다.<br>" +
        "                                        5. 비회원 : “회원”이 아니면서 “회사”가 제공하는 서비스를 이용하는 자를 말합니다.<br>" +
        "                                        6. 온라인(ON-LINE) 및 오프라인(OFF-LINE) 서비스 : “회사”가 “플랫폼” 접속 “회원”에게 “플랫폼”을 통하여 제공하는 서비스를 온라인(ON-LINE) 서비스라 하며, 그 외 방법으로 제공하는 서비스를 오프라인(OFF –LINE) 서비스라 합니다.<br>" +
        "                                        7. 의료기관(검진기관) : 서비스를 제공하기 위해 “회사”와 계약 관계에 있는 의료 및 검진기관을 말합니다.<br>(검진센터, 대학병원, 일반의원 등 서비스 제공을 위해 계약한 모든 의료 기관)<br>" +
        "                                        8. 아이디(ID) : “회원”의 식별 및 서비스 이용을 위하여 “회원”이 선정하고 “회사”가 승인하는 기호, 문자 또는 숫자이며, 경우에 따라 아래 9항의 사번, 휴대폰 번호 또는 고객을 특정할 수 있는 정보로 대체하여 이용<br>" +
        "                                        9. 고객을 특정할 수 있는 정보 : “회원”의 식별과 “플랫폼”서비스 이용을 위하여 협약된 기업(단체)에서 사용하는 고유한 일련번호 또는 기호, 문자<br>" +
        "                                        10. CI: Connecting Information, 회원 식별을 위한 암호화된 이용자 확인값<br>" +
        "                                        1) CI (연계정보)는 기존 데이터베이스에 동일한 회원이 있는지 대조하는 등의 회원비교식별을 목적으로만 사용됩니다.<br>" +
        "                                        11. 비밀번호(PASSWORD) : “회원”이 부여받은 “아이디(ID)”와 일치되는 “회원”임을 확인하고 비밀보호를 위해 “회원” 자신이 정한 문자 또는 숫자의 조합을 말합니다.<br>" +
        "                                        12. 관리책임자 : 서비스의 전반적인 관리와 원활한 운영을 위하여 회사에서 선정한 관리자를 말합니다.<br>" +

        "                                        14. 추가 정보 : 기업 회원의 소속회사 정보 일체<br>" +
        "                                        15. 해지 및 탈퇴 : “기업(단체)회원” 또는 “개인회원”이 서비스 가입 후 이용 계약을 종료하는 것을 말합니다.<br> 기업 또는 개인회원 가입 시 입력한 필수 정보 및 추가 정보는 회원 탈퇴 시 즉시 삭제합니다.<br>" +
        "                                        단, 다음의 정보에 대해서는 관련법력의 근거에 따라 명시한 기간 동안 보존합니다.<br>" +
        "                                        1) 계약 또는 청약철회 등에 관한 기록<br>" +
